{% extends "base.html" %}
{% block title %}Log in — MediOrder{% endblock %}
{% block content %}
<h1>Log in</h1>

<form method="post" class="auth-form">
    <label>Email
        <input type="email" name="email" value="{{ form.get('email', '') }}" required autofocus>
    </label>
    <label>Password
        <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary btn-large">Log in</button>
</form>

<p class="hint">Don't have an account? <a href="{{ url_for('register') }}">Create one</a>.</p>
{% endblock %}
