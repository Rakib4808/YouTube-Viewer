{% extends "base.html" %}
{% block title %}Track Order — MediOrder{% endblock %}
{% block content %}
<h1>Track your order</h1>
<p>Enter the order number you received when placing your order (e.g. MO-1A2B3C4D).</p>

<form method="post" action="{{ url_for('track_order') }}" class="track-form">
    <input type="text" name="order_number" placeholder="MO-XXXXXXXX" required>
    <button type="submit" class="btn btn-primary">Track</button>
</form>
{% endblock %}
